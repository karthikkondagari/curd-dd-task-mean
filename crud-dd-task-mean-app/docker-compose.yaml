
services:

  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: karthik008/back:v1
    container_name: backend
    restart: always
    ports:
      - "5000:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/meancrud
    depends_on:
      - mongodb

  frontend:
    image: karthik008/front:v2
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data: